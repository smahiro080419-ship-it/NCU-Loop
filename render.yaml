services:
  - type: web
    name: ncu-loop-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: APP_URL
        value: https://smahiro080419-ship-it.github.io/NCU-Loop
      - key: ALLOWED_ORIGINS
        value: https://smahiro080419-ship-it.github.io
