services:
  - type: web
    name: ncu-loop-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: APP_URL
        value: https://smahiro080419-ship-it.github.io/NCU-Loop
      - key: ALLOWED_ORIGINS
        value: https://smahiro080419-ship-it.github.io
